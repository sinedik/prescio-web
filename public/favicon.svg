<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="18" fill="#0d0d0d"/>
  <!-- Upper arc  thick -->
  <path d="M10 40 Q40 10 70 40" stroke="#00ff88" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Lower arc  thin, faded -->
  <path d="M10 40 Q40 70 70 40" stroke="#00ff88" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Iris ring -->
  <circle cx="40" cy="40" r="11" stroke="#00ff88" stroke-width="2" fill="none"/>
  <!-- Crosshair tick marks -->
  <line x1="40" y1="25" x2="40" y2="31" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="49" x2="40" y2="55" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25" y1="40" x2="31" y2="40" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="40" x2="55" y2="40" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Focus dot -->
  <circle cx="40" cy="40" r="4.5" fill="#00ff88"/>
</svg>
